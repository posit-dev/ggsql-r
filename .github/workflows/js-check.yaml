on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: js-check.yaml

permissions: read-all

jobs:
  js-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run JS checks
        run: npm run check
